apiVersion: v1
kind: Secret
metadata:
  name: storage-connection
  namespace: upload
type: Opaque
stringData:
  connection: "${STORAGE_CONNECTION_STRING}"
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: azure-queue-auth
  namespace: upload
spec:
  secretTargetRef:
    - parameter: connection
      name: storage-connection
      key: connection
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-scaledobject
  namespace: upload
spec:
  scaleTargetRef:
    name: worker
  pollingInterval: 15
  cooldownPeriod: 300
  minReplicaCount: 0
  maxReplicaCount: 10
  triggers:
    - type: azure-queue
      metadata:
        queueName: work-items
        queueLength: "1"
        connectionFromEnv: ""
      authenticationRef:
        name: azure-queue-auth
