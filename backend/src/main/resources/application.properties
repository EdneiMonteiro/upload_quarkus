quarkus.http.port=8000
quarkus.log.level=INFO
quarkus.log.console.json=true

upload.storage.blob-service-url=${BLOB_SERVICE_URL}
upload.storage.queue-service-url=${QUEUE_SERVICE_URL}
upload.storage.table-service-url=${TABLE_SERVICE_URL}
upload.storage.uploads-container-name=${UPLOADS_CONTAINER_NAME:uploads}
upload.storage.work-queue-name=${WORK_QUEUE_NAME:work-items}
upload.storage.status-table-name=${STATUS_TABLE_NAME:uploadstatus}
upload.upload.prefix=${UPLOAD_PREFIX:uploads}
upload.upload.default-submitted-by=${UPLOAD_DEFAULT_SUBMITTED_BY:anonymous}
upload.upload.chunk-strategy=${UPLOAD_CHUNK_STRATEGY:rows:1000}

quarkus.http.limits.max-body-size=10M
