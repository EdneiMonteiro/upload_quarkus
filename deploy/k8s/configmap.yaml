apiVersion: v1
kind: ConfigMap
metadata:
  name: upload-config
  namespace: upload
data:
  BLOB_SERVICE_URL: "${BLOB_SERVICE_URL}"
  QUEUE_SERVICE_URL: "${QUEUE_SERVICE_URL}"
  TABLE_SERVICE_URL: "${TABLE_SERVICE_URL}"
  UPLOADS_CONTAINER_NAME: "uploads"
  WORK_QUEUE_NAME: "work-items"
  POISON_QUEUE_NAME: "work-items-poison"
  STATUS_TABLE_NAME: "uploadstatus"
  UPLOAD_PREFIX: "uploads"
  WORKER_POLLING_INTERVAL_SECONDS: "10"
  WORKER_BATCH_SIZE: "1"
  WORKER_PER_RECORD_DELAY_MS: "100"
  QUEUE_VISIBILITY_TIMEOUT_SECONDS: "3600"
  BACKEND_TIMEOUT_SECONDS: "60"
