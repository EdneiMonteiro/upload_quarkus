apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: upload
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ${ACR_LOGIN_SERVER}/web:latest
          ports:
            - containerPort: 8000
          env:
            - name: BACKEND_BASE_URL
              value: "http://backend.upload.svc.cluster.local:8000"
          envFrom:
            - configMapRef:
                name: upload-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8000
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8000
            initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: upload
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 8000
  type: LoadBalancer
