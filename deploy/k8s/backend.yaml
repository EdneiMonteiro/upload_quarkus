apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: upload
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: upload-workload
      containers:
        - name: backend
          image: ${ACR_LOGIN_SERVER}/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: upload-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8000
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8000
            initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: upload
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
