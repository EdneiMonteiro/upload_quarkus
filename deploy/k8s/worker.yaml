apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: upload
spec:
  replicas: 0
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: upload-workload
      containers:
        - name: worker
          image: ${ACR_LOGIN_SERVER}/worker:latest
          envFrom:
            - configMapRef:
                name: upload-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8000
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8000
            initialDelaySeconds: 15
